name: Build Shadow Client V2

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.2.0

      - name: Build
        run: gradle clean build --stacktrace

      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: ShadowClientV2
          path: build/libs/*.jar
